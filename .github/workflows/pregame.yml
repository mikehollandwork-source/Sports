name: Board refresh

# Rebuilds the whole board on every firing so picks always reflect the latest
# lineups/lines/odds. Asks for every 5 minutes, all day - GitHub throttles
# scheduled crons hard (~2h between firings), so this just runs as often as the
# platform allows. Started games stay frozen (main._lock_started_games);
# Telegram only fires when the pick set changes, so frequent runs don't spam.
on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"   # max frequency; GitHub throttles to whatever it allows

permissions:
  contents: write

concurrency:
  group: pregame-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-game pick refresh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.pregame

      - name: Commit refreshed picks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No refresh this run."
          else
            git commit -m "Pre-game pick refresh ($(date -u +%Y-%m-%dT%H:%MZ))"
            for i in 1 2 3; do
              git pull --rebase origin "${{ github.ref_name }}" \
                && git push origin "HEAD:${{ github.ref_name }}" && break
              echo "push retry $i"; sleep 5
            done
          fi
