name: Pre-game refresh

# Polls every ~15 min during MLB game hours and, ~30 min before each distinct
# first-pitch time, regenerates picks once (simultaneous games = one run) and
# Telegrams the result. Actions cron is ~15-min granular and can be delayed, so
# "30 min before" is approximate; the per-day state file dedupes each slot.
on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 0-3,16-23 * * *"   # ~12:00-23:00 ET, covers afternoon -> late games

permissions:
  contents: write

concurrency:
  group: pregame-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-game pick refresh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.pregame

      - name: Commit refreshed picks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No refresh this run."
          else
            git commit -m "Pre-game pick refresh ($(date -u +%Y-%m-%dT%H:%MZ))"
            for i in 1 2 3; do
              git pull --rebase origin "${{ github.ref_name }}" \
                && git push origin "HEAD:${{ github.ref_name }}" && break
              echo "push retry $i"; sleep 5
            done
          fi
