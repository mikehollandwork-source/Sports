name: Board refresh

# Keeps the board fresh ALL DAY. GitHub throttles high-frequency scheduled crons
# hard (a "*/5" cron typically fires once early, then gets dropped for hours),
# which is why refreshes used to work for the first game and then stop. Instead
# we kick HOURLY from ~noon ET through ~1am ET - hourly crons fire reliably - and
# each kick launches a loop that rebuilds the board every ~5 min. A newer kick
# cancels the older loop (clean handoff); if GitHub ever skips an hourly kick the
# running loop keeps going up to ~4.75h, so coverage is self-healing.
# (Cron is UTC and fixed; 16:00 UTC = noon ET during EDT. It shifts an hour under
# EST, which only moves the start ~an hour - harmless.)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 16-23 * * *"   # hourly, noon ET -> 7pm ET
    - cron: "0 0-5 * * *"     # hourly, 8pm ET -> 1am ET (next UTC day)

permissions:
  contents: write

# newest kick wins: it cancels the running loop and takes over the day
concurrency:
  group: pregame-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # under the 6h hard cap; the loop below runs ~4.75h
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Continuous board refresh loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          END=$(( $(date +%s) + 285*60 ))   # loop for ~4.75h, then the job ends
          while [ "$(date +%s)" -lt "$END" ]; do
            git pull --rebase -X theirs origin "${{ github.ref_name }}" || true
            python -m src.pregame || echo "pregame errored this tick, continuing"
            git add output/
            if ! git diff --staged --quiet; then
              git commit -m "Pre-game refresh ($(date -u +%Y-%m-%dT%H:%MZ))"
              for i in 1 2 3 4; do
                git pull --rebase -X theirs origin "${{ github.ref_name }}" \
                  && git push origin "HEAD:${{ github.ref_name }}" && break
                echo "push retry $i"; sleep 5
              done
            fi
            sleep 300   # ~5 min between refreshes
          done
