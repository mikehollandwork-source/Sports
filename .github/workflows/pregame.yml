name: Board refresh

# Posts a fresh board to Telegram every hour, ON THE HOUR, all day. GitHub
# throttles high-frequency scheduled crons hard (a "*/5" cron fires once early
# then gets dropped for hours), so we kick HOURLY from ~noon ET through ~1am ET -
# hourly crons fire reliably - and each kick runs a loop that rebuilds the board
# and posts it to Telegram, then sleeps to the NEXT top of the hour and repeats.
# So the board lands on the hour whether the loop is carrying the day or a fresh
# hourly kick just took over. A newer kick cancels the older loop (clean handoff);
# if GitHub ever skips an hourly kick the running loop keeps firing on the hour up
# to ~4.75h, so coverage is self-healing.
# (Cron is UTC and fixed; 16:00 UTC = noon ET during EDT. It shifts an hour under
# EST, which only moves the start ~an hour - harmless.)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 16-23 * * *"   # hourly, noon ET -> 7pm ET
    - cron: "0 0-5 * * *"     # hourly, 8pm ET -> 1am ET (next UTC day)

permissions:
  contents: write

# newest kick wins: it cancels the running loop and takes over the day
concurrency:
  group: pregame-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # under the 6h hard cap; the loop below runs ~4.75h
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Hourly on-the-hour board post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          END=$(( $(date +%s) + 285*60 ))   # loop for ~4.75h, then the job ends
          while [ "$(date +%s)" -lt "$END" ]; do
            git pull --rebase -X theirs origin "${{ github.ref_name }}" || true
            # --telegram forces the board to the phone every hour, on the hour
            python -m src.pregame --telegram || echo "pregame errored this tick, continuing"
            git add output/
            if ! git diff --staged --quiet; then
              git commit -m "Pre-game refresh ($(date -u +%Y-%m-%dT%H:%MZ))"
              for i in 1 2 3 4; do
                git pull --rebase -X theirs origin "${{ github.ref_name }}" \
                  && git push origin "HEAD:${{ github.ref_name }}" && break
                echo "push retry $i"; sleep 5
              done
            fi
            # sleep to the NEXT top of the hour, so the next post lands on the hour
            NOW=$(date +%s); NEXT=$(( (NOW/3600 + 1)*3600 ))
            SLEEP=$(( NEXT - NOW ))
            [ "$(( NEXT ))" -lt "$END" ] || break   # don't nap past the job's end
            echo "next board at $(date -u -d @${NEXT} +%H:%MZ) (sleeping ${SLEEP}s)"
            sleep "$SLEEP"
          done
