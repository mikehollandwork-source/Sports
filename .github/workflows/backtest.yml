name: Backtest

# Reconstructs what the edge finder would have picked over the last N days and
# settles those picks at $1 each (even money). Manual trigger only.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to backtest"
        required: false
        default: "10"
      end:
        description: "Last date (YYYY-MM-DD). Blank = yesterday (US/Eastern)."
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Snapshot backtest first (fast, real results); post + COMMIT it immediately
      # so the report lands without waiting on the slow legacy step below.
      - name: Run signal backtest (snapshot-based, real results)
        run: python -m src.signal_backtest

      # Prop backtest: does the hits-in-wins prop, split by our signals, make ROI?
      # Reconstructs each past board play's prop from the MLB API (slower).
      - name: Run prop backtest
        continue-on-error: true
        timeout-minutes: 25
        run: python -m src.prop_backtest

      # Polymarket order-book money (size imbalance + run-up drift) x signals.
      - name: Run PM order-book backtest
        continue-on-error: true
        timeout-minutes: 10
        run: python -m src.pm_book_backtest

      - name: Post backtest issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --title "Signal backtest $(date -u +%Y-%m-%d)" \
            --body-file output/signal_backtest.md
          if [ -f output/prop_backtest.md ]; then
            gh issue create --title "Prop backtest $(date -u +%Y-%m-%d)" \
              --body-file output/prop_backtest.md
          fi
          if [ -f output/pm_book_backtest.md ]; then
            gh issue create --title "PM order-book backtest $(date -u +%Y-%m-%d)" \
              --body-file output/pm_book_backtest.md
          fi

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No report changes."
          else
            git commit -m "Backtest report ($(date -u +%Y-%m-%d))"
            for i in 1 2 3 4; do
              git pull --rebase origin "${{ github.ref_name }}" \
                && git push origin "HEAD:${{ github.ref_name }}" && break
              echo "push retry $i"; sleep 5
            done
          fi

      # Legacy re-derivation backtest last (slow; best-effort, output not committed).
      - name: Run legacy re-derivation backtest (slow; best-effort)
        continue-on-error: true
        timeout-minutes: 20
        env:
          BT_END: ${{ github.event.inputs.end }}
          BT_DAYS: ${{ github.event.inputs.days }}
        run: |
          ARGS="--days ${BT_DAYS:-10}"
          if [ -n "$BT_END" ]; then ARGS="$ARGS --end $BT_END"; fi
          python -m src.backtest $ARGS
