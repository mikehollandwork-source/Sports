name: Win-condition calibration

# Manual only: measures how well each win-condition signal predicts winning over a
# window of completed games, and commits the report (output/wc_calibration.md/json).
on:
  workflow_dispatch:
    inputs:
      signal:
        description: "wincond / edge / line calibration, or books = backtest Leans & Leans-faded."
        required: false
        default: "wincond"
        type: choice
        options: ["wincond", "edge", "line", "home", "division", "quality", "sp", "bvp", "combo", "wiki", "weather", "clutch", "ump", "fatigue", "books"]
      days:
        description: "How many days back to analyze (wincond can do the season; edge is heavier, use ~14)."
        required: false
        default: "21"
      end:
        description: "Last date (YYYY-MM-DD). Blank = yesterday (US/Eastern)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  calibrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Run calibration
        run: |
          MODULE=src.wc_calibrate
          [ "${{ github.event.inputs.signal }}" = "edge" ] && MODULE=src.edge_calibrate
          [ "${{ github.event.inputs.signal }}" = "line" ] && MODULE=src.line_calibrate
          [ "${{ github.event.inputs.signal }}" = "home" ] && MODULE=src.home_calibrate
          [ "${{ github.event.inputs.signal }}" = "division" ] && MODULE=src.division_calibrate
          [ "${{ github.event.inputs.signal }}" = "quality" ] && MODULE=src.quality_calibrate
          [ "${{ github.event.inputs.signal }}" = "sp" ] && MODULE=src.sp_calibrate
          [ "${{ github.event.inputs.signal }}" = "bvp" ] && MODULE=src.bvp_calibrate
          [ "${{ github.event.inputs.signal }}" = "combo" ] && MODULE=src.combo_calibrate
          [ "${{ github.event.inputs.signal }}" = "wiki" ] && MODULE=src.wiki_calibrate
          [ "${{ github.event.inputs.signal }}" = "weather" ] && MODULE=src.wx_calibrate
          [ "${{ github.event.inputs.signal }}" = "clutch" ] && MODULE=src.clutch_calibrate
          [ "${{ github.event.inputs.signal }}" = "ump" ] && MODULE=src.umpire
          [ "${{ github.event.inputs.signal }}" = "fatigue" ] && MODULE=src.fatigue_calibrate
          [ "${{ github.event.inputs.signal }}" = "books" ] && MODULE=src.backtest_books
          python -m "$MODULE" --days "${{ github.event.inputs.days }}" \
            ${{ github.event.inputs.end && format('--end {0}', github.event.inputs.end) || '' }}

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/wc_calibration.json output/wc_calibration.md \
                  output/edge_calibration.json output/edge_calibration.md \
                  output/line_analysis.json output/line_analysis.md \
                  output/home_analysis.json output/home_analysis.md \
                  output/division_analysis.json output/division_analysis.md \
                  output/quality_analysis.json output/quality_analysis.md \
                  output/sp_analysis.json output/sp_analysis.md \
                  output/bvp_analysis.json output/bvp_analysis.md \
                  output/combo_calibration.json output/combo_calibration.md \
                  output/wiki_calibration.json output/wiki_calibration.md \
                  output/wx_calibration.json output/wx_calibration.md \
                  output/clutch_calibration.json output/clutch_calibration.md \
                  output/ump_tendencies_*.json output/ump_calibration.json output/ump_calibration.md \
                  output/fatigue_calibration.json output/fatigue_calibration.md \
                  output/books_backtest.json output/books_backtest.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "Win-condition calibration report ($(date -u +%Y-%m-%d))"
            for i in 1 2 3; do
              git pull --rebase origin "${{ github.ref_name }}" \
                && git push origin "HEAD:${{ github.ref_name }}" && break
              echo "retry $i"; sleep 5
            done
          fi
