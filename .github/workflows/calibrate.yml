name: Win-condition calibration

# Manual only: measures how well each win-condition signal predicts winning over a
# window of completed games, and commits the report (output/wc_calibration.md/json).
on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to analyze."
        required: false
        default: "21"
      end:
        description: "Last date (YYYY-MM-DD). Blank = yesterday (US/Eastern)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  calibrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Run win-condition calibration
        run: |
          python -m src.wc_calibrate --days "${{ github.event.inputs.days }}" \
            ${{ github.event.inputs.end && format('--end {0}', github.event.inputs.end) || '' }}

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/wc_calibration.json output/wc_calibration.md
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "Win-condition calibration report ($(date -u +%Y-%m-%d))"
            for i in 1 2 3; do
              git pull --rebase origin "${{ github.ref_name }}" \
                && git push origin "HEAD:${{ github.ref_name }}" && break
              echo "retry $i"; sleep 5
            done
          fi
