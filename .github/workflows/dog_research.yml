name: Underdog research

# One-off deep scan: every final game this season, market underdog by ESPN close,
# point-in-time pre-game features + line movement, mined for a profitable dog
# signal. Manual trigger. Runs on Actions (MLB API + ESPN reachable there).
on:
  workflow_dispatch:
    inputs:
      start:
        description: "Season start date (YYYY-MM-DD)"
        required: false
        default: "2026-03-25"
      end:
        description: "End date (YYYY-MM-DD). Blank = yesterday."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run underdog research
        env:
          START: ${{ github.event.inputs.start }}
          END: ${{ github.event.inputs.end }}
        run: |
          ARGS="--start ${START:-2026-03-25}"
          if [ -n "$END" ]; then ARGS="$ARGS --end $END"; fi
          python -m src.dog_research $ARGS
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/dog_research.md output/dog_research.json
          if git diff --staged --quiet; then
            echo "No report."
          else
            git commit -m "Underdog research report ($(date -u +%Y-%m-%d))"
            for i in 1 2 3 4; do
              git pull --rebase origin "${{ github.ref_name }}" \
                && git push origin "HEAD:${{ github.ref_name }}" && break
              echo "retry $i"; sleep 5
            done
          fi
