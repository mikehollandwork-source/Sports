name: 10-day audit

# Every ~10 days: re-run the winners-vs-losers autopsy over the graded books and
# commit the report (output/audit.md). Manual dispatch any time.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 1,11,21 * *"   # the 1st/11th/21st ~ every 10 days, 08:00 ET

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run audit
        run: python -m src.audit
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/audit.json output/audit.md
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "10-day audit ($(date -u +%Y-%m-%d))"
            for i in 1 2 3; do
              git pull --rebase origin "${{ github.ref_name }}" \
                && git push origin "HEAD:${{ github.ref_name }}" && break
              echo "retry $i"; sleep 5
            done
          fi
