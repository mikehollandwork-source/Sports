name: MLB Edge Finder

# Runs the scraper on GitHub's runners, which have full internet access
# (unlike the build sandbox). Trigger it manually from the phone via the
# "Run workflow" button, or let the daily schedule fire.
on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date to analyze (YYYY-MM-DD). Blank = today (US/Eastern)."
        required: false
        default: ""
      covers_debug:
        description: "Dump raw covers.com HTML to output/covers_debug/ (for fixing selectors)."
        type: boolean
        required: false
        default: false
      public_debug:
        description: "Dump raw extra-public-source HTML to output/public_debug/ (for fixing selectors)."
        type: boolean
        required: false
        default: false
      grade_date:
        description: "Date to grade for the bankroll (YYYY-MM-DD). Blank = yesterday (US/Eastern)."
        required: false
        default: ""
  schedule:
    # 15:00 UTC ~= 11:00 ET, after lineups/probables are usually posted.
    - cron: "0 15 * * *"

permissions:
  contents: write  # allow committing the output JSON back to the repo
  issues: write    # allow posting the daily picks issue

jobs:
  build-picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Grade prior day's picks (running bankroll)
        env:
          GRADE_DATE: ${{ github.event.inputs.grade_date }}
        run: python -m src.grade   # GRADE_DATE blank -> yesterday US/Eastern

      - name: Run edge finder
        env:
          PICKS_DATE: ${{ github.event.inputs.date }}
          COVERS_DEBUG: ${{ github.event.inputs.covers_debug == 'true' && '1' || '' }}
          PUBLIC_DEBUG: ${{ github.event.inputs.public_debug == 'true' && '1' || '' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      - name: Post daily picks issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(cat output/latest_date.txt)
          BODY=output/latest_summary.md
          existing=$(gh issue list --search "Picks $DATE in:title" --state all \
                       --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file "$BODY"
          else
            gh issue create --title "Picks $DATE" --body-file "$BODY"
          fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update MLB picks ($(date -u +%Y-%m-%d))"
            git push
          fi
